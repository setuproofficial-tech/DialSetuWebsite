<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent App View | DialSetu Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }</style>
</head>
<body class="p-4">

  <a href="index.html" class="mb-6 text-blue-600 font-bold hover:underline">← Back to Website</a>

  <!-- Mobile Phone Mockup -->
  <div class="w-full max-w-[360px] bg-slate-50 h-[700px] border-[14px] border-slate-900 rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col relative">
    
    <!-- Notch -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-slate-900 rounded-b-xl z-50"></div>

    <!-- App Header -->
    <div class="bg-blue-600 text-white pt-10 pb-4 px-6 shadow-md">
      <h2 class="font-bold text-lg">DialSetu Pro Agent</h2>
      <p class="text-blue-200 text-xs">Logged in as: Rahul Sharma</p>
    </div>

    <!-- Current Lead Area -->
    <div class="p-4 flex-1 overflow-y-auto">
      <p class="text-xs font-bold text-slate-500 uppercase mb-2">Current Lead / वर्तमान लीड</p>
      
      <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 mb-6">
        <h3 class="text-2xl font-black text-slate-900">Ramesh Kumar</h3>
        <p class="text-sm text-slate-500 mt-1 mb-6">Source: Google Ads | Interested in 3BHK</p>
        
        <div class="flex gap-3">
          <button class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold shadow-md shadow-blue-500/30">📞 Call</button>
          <button class="flex-1 bg-green-500 text-white py-3 rounded-lg font-bold shadow-md shadow-green-500/30">💬 WhatsApp</button>
        </div>
      </div>

      <p class="text-xs font-bold text-slate-500 uppercase mb-2">Update Status / स्थिति अपडेट करें</p>
      
      <!-- Status Buttons -->
      <div class="grid grid-cols-2 gap-3">
        <button class="bg-white border border-slate-200 py-3 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50">✅ Interested</button>
        <button class="bg-white border border-slate-200 py-3 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50">🕒 Follow Up</button>
        <button class="bg-white border border-slate-200 py-3 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50">❌ Not Interested</button>
        <button class="bg-white border border-slate-200 py-3 rounded-lg text-sm font-semibold text-slate-700 hover:bg-slate-50">🚫 Wrong Number</button>
      </div>
    </div>

  </div>

</body>
</html>
